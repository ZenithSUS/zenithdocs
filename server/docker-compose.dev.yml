services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  worker:
    build: .
    env_file:
      - .env
    command: npm run dev:worker
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
