services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    image: zenithdocs-server:development
    env_file:
      - .env
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  worker:
    image: zenithdocs-server:development
    env_file:
      - .env
    command: npm run dev:worker
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
